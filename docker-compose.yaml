version: '3.8'
services:
  airflow-webserver:
    build: .
    container_name: airflow-server
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:2324@144.24.127.112:5432/airflow_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_CREATE=false
      - PYTHONUNBUFFERED=1
# --- FIXED FOR 2.10.5 ---
      # 2.x doesn't use the 'Auth Manager' keys the same way as 3.x
      - AIRFLOW__WEBSERVER__WEB_SERVER_CONFIG=/opt/airflow/webserver_config.py
      - AIRFLOW__WEBSERVER__SECRET_KEY=9e4f3b2c8d7a6f1e0c5b4a9d8e7f6c3b1a2d4e6f8c0b9a7d5e3f1c4b6a8d2f0
      # Ensure cookie security is OFF for HTTP/Public IP
      - AIRFLOW__WEBSERVER__COOKIE_SECURE=False
      # - AIRFLOW__API__SECRET_KEY=a8f3e1d5c4b9e7a2f1d8c6b4a9e3d2f7c8e1b9a6d4f3e2c7a1b8d5f9e4
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./webserver_config.py:/opt/airflow/webserver_config.py
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      # Airflow 3 standard health endpoint
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    env_file:
      - .env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:2324@144.24.127.112:5432/airflow_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__API__SECRET_KEY=a8f3e1d5c4b9e7a2f1d8c6b4a9e3d2f7c8e1b9a6d4f3e2c7a1b8d5f9e4
      # AIRFLOW 3 REQUIREMENT: Tell the scheduler how to reach the API server
      - AIRFLOW__CORE__INTERNAL_API_URL=http://airflow-webserver:8080
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    depends_on:
      airflow-webserver:
        condition: service_healthy
    command: scheduler